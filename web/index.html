<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Haptic Chess — Live</title>
<style>
  :root {
    --page: #f9f9f7; --surface: #fcfcfb;
    --ink: #0b0b0b; --ink-2: #52514e; --muted: #898781;
    --grid: #e1e0d9; --baseline: #c3c2b7; --border: rgba(11,11,11,0.10);
    --blue: #2a78d6; --aqua: #1baf7a; --yellow: #eda100; --green: #008300;
    --violet: #4a3aa7; --red: #e34948;
    --good: #0ca30c; --warning: #fab219; --critical: #d03b3b;
    --sq-light: #f0efec; --sq-dark: #c9c4b8; --pc-halo: rgba(255,255,255,.30);
  }
  :root[data-theme="light"] {
    --page: #f9f9f7; --surface: #fcfcfb;
    --ink: #0b0b0b; --ink-2: #52514e; --muted: #898781;
    --grid: #e1e0d9; --baseline: #c3c2b7; --border: rgba(11,11,11,0.10);
    --blue: #2a78d6; --aqua: #1baf7a; --yellow: #eda100; --green: #008300;
    --violet: #4a3aa7; --red: #e34948;
    --good: #0ca30c; --warning: #fab219; --critical: #d03b3b;
    --sq-light: #f0efec; --sq-dark: #c9c4b8; --pc-halo: rgba(255,255,255,.30);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --page: #0d0d0d; --surface: #1a1a19;
      --ink: #ffffff; --ink-2: #c3c2b7; --muted: #898781;
      --grid: #2c2c2a; --baseline: #383835; --border: rgba(255,255,255,0.10);
      --blue: #3987e5; --aqua: #199e70; --yellow: #c98500; --green: #008300;
      --violet: #9085e9; --red: #e66767;
      --sq-light: #383835; --sq-dark: #262624; --pc-halo: rgba(220,220,215,.85);
    }
  }
  :root[data-theme="dark"] {
    --page: #0d0d0d; --surface: #1a1a19;
    --ink: #ffffff; --ink-2: #c3c2b7; --muted: #898781;
    --grid: #2c2c2a; --baseline: #383835; --border: rgba(255,255,255,0.10);
    --blue: #3987e5; --aqua: #199e70; --yellow: #c98500; --green: #008300;
    --violet: #9085e9; --red: #e66767;
    --sq-light: #383835; --sq-dark: #262624; --pc-halo: rgba(220,220,215,.85);
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    background: var(--page); color: var(--ink);
    font: 14px/1.45 system-ui, -apple-system, "Segoe UI", sans-serif;
    padding: 16px; max-width: 1100px; margin: 0 auto;
  }
  header { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
  header h1 { font-size: 17px; font-weight: 650; margin-right: auto; }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    border: 1px solid var(--border); border-radius: 999px;
    padding: 2px 10px; font-size: 12px; color: var(--ink-2); background: var(--surface);
  }
  .chip .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
  .chip.ok .dot { background: var(--good); }
  .chip.bad .dot { background: var(--critical); }
  .chip.bad { color: var(--critical); }

  .banner {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 18px; margin-bottom: 14px;
    display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap;
  }
  .banner .state { font-size: 12px; color: var(--muted); letter-spacing: .04em; text-transform: uppercase; }
  .banner .hint { font-size: 20px; font-weight: 650; }

  .grid { display: grid; grid-template-columns: minmax(300px, 420px) 1fr; gap: 14px; }
  @media (max-width: 820px) { .grid { grid-template-columns: 1fr; } }
  .panel {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px;
  }
  .panel h2 { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 10px; }

  #board {
    display: grid; grid-template-columns: repeat(8, 1fr); grid-template-rows: repeat(8, 1fr); aspect-ratio: 1/1;
    border: 1px solid var(--border); border-radius: 6px; overflow: hidden; user-select: none;
  }
  #board .sq { display: flex; align-items: center; justify-content: center; font-size: clamp(18px, 4.2vw, 34px); }
  #board .sq.w { color: #fdfdfc; text-shadow: -1px 0 0 rgba(0,0,0,.7), 1px 0 0 rgba(0,0,0,.7), 0 -1px 0 rgba(0,0,0,.7), 0 1px 0 rgba(0,0,0,.7); }
  #board .sq.b { color: #161615; text-shadow: -1px 0 0 var(--pc-halo), 1px 0 0 var(--pc-halo), 0 -1px 0 var(--pc-halo), 0 1px 0 var(--pc-halo); }
  #board .sq.l { background: var(--sq-light); } #board .sq.d { background: var(--sq-dark); }
  #board .sq.hl { box-shadow: inset 0 0 0 3px var(--blue); }
  #board .sq.ex { box-shadow: inset 0 0 0 3px var(--yellow); }
  button.ctl {
    border: 1px solid var(--border); border-radius: 999px; background: var(--surface);
    color: var(--ink); font: 600 12px/1.4 system-ui, -apple-system, "Segoe UI", sans-serif;
    padding: 3px 12px; cursor: pointer;
  }
  button.ctl:hover { border-color: var(--muted); }
  button.ctl.on { border-color: var(--blue); color: var(--blue); }
  .banner .expected { font-size: 20px; font-weight: 650; color: var(--yellow); }
  .boardmeta { display: flex; gap: 12px; margin-top: 8px; font-size: 12px; color: var(--ink-2); flex-wrap: wrap; }
  #moves { margin-top: 10px; font-size: 13px; color: var(--ink-2); line-height: 1.8; max-height: 130px; overflow-y: auto; }
  #moves b { color: var(--ink); font-weight: 600; }

  .pressrow { display: flex; align-items: baseline; gap: 14px; margin-bottom: 6px; flex-wrap: wrap; }
  .pressrow .val { font-size: 30px; font-weight: 650; }
  .pressrow .sub { font-size: 12px; color: var(--muted); }
  .squeezing { color: var(--blue); font-weight: 650; font-size: 13px; visibility: hidden; }
  .squeezing.on { visibility: visible; }
  #spark { width: 100%; height: 120px; display: block; }
  #spark text { font-size: 10px; fill: var(--muted); }

  #log { list-style: none; max-height: 380px; overflow-y: auto; font-size: 13px; }
  #log li { display: flex; gap: 8px; align-items: baseline; padding: 3px 0; border-bottom: 1px solid var(--grid); }
  #log .t { color: var(--muted); font-variant-numeric: tabular-nums; font-size: 11px; flex: 0 0 56px; }
  #log .k { flex: 0 0 96px; display: inline-flex; align-items: center; gap: 6px; color: var(--ink-2); font-size: 11px; }
  #log .k::before { content: ""; width: 8px; height: 8px; border-radius: 2px; background: var(--kc, var(--muted)); }
  #log .d { color: var(--ink); }
  .err { color: var(--critical); font-size: 12px; margin-top: 6px; min-height: 1em; }
</style>
</head>
<body>
<header>
  <h1>Haptic Chess — Live</h1>
  <span class="chip" id="chip-robot"><span class="dot"></span>robot</span>
  <span class="chip" id="chip-session"><span class="dot"></span>session</span>
  <span class="chip" id="chip-sensor"><span class="dot"></span>kGoal</span>
  <span class="chip" id="chip-buzzer"><span class="dot"></span>Hush</span>
  <button class="ctl" id="btn-practice" onclick="togglePractice()">practice: —</button>
  <button class="ctl" id="btn-newgame" onclick="sendCommand({command:'reset'})">new game</button>
</header>

<div class="banner">
  <span class="state" id="state">—</span>
  <span class="hint" id="hint">connecting to dashboard…</span>
  <span class="expected" id="expected"></span>
</div>

<div class="grid">
  <div>
    <div class="panel">
      <h2>Board</h2>
      <div id="board"></div>
      <div class="boardmeta">
        <span id="meta-color">you: —</span>
        <span id="meta-turn">turn: —</span>
        <span id="meta-msg">last input: —</span>
        <span id="meta-stats"></span>
      </div>
      <div id="moves">—</div>
    </div>
  </div>
  <div style="display:flex; flex-direction:column; gap:14px;">
    <div class="panel">
      <h2>Squeeze sensor</h2>
      <div class="pressrow">
        <span class="val" id="pressure">—</span>
        <span class="sub">pressure</span>
        <span class="squeezing" id="squeezing">● SQUEEZING</span>
        <span class="sub" id="battery"></span>
      </div>
      <svg id="spark" preserveAspectRatio="none"></svg>
      <div class="err" id="err"></div>
    </div>
    <div class="panel">
      <h2>Activity</h2>
      <ul id="log"></ul>
    </div>
  </div>
</div>

<script>
const themeParam = new URLSearchParams(location.search).get("theme");
if (themeParam) document.documentElement.dataset.theme = themeParam;
const GLYPHS = {k:"♚",q:"♛",r:"♜",b:"♝",n:"♞",p:"♟"};
const KIND_COLOR = {
  buzz_signal: "var(--blue)", buzz_groups: "var(--aqua)",
  squeeze_group: "var(--yellow)", squeeze_long: "var(--green)",
  decoded: "var(--violet)", engine: "var(--red)", move: "var(--ink)",
  practice: "var(--yellow)", practice_fail: "var(--critical)",
};
const KIND_LABEL = {
  buzz_signal: "buzz sig", buzz_groups: "buzz grp",
  squeeze_group: "squeeze", squeeze_long: "squeeze L",
  decoded: "decoded", engine: "engine", move: "move",
  practice: "practice", practice_fail: "FAIL",
};
let practiceMode = null;
async function sendCommand(cmd) {
  try {
    const r = await (await fetch("/command", {method: "POST", body: JSON.stringify(cmd)})).json();
    if (r.error) alert(r.error);
  } catch (e) { alert("command failed: " + e); }
}
function togglePractice() { sendCommand({command: "set_practice", on: !practiceMode}); }

const pressureBuf = [];   // {t, p}
const WINDOW_S = 30;
const $ = id => document.getElementById(id);

function setChip(id, ok, label) {
  const el = $(id);
  el.className = "chip " + (ok ? "ok" : "bad");
  el.innerHTML = `<span class="dot"></span>${label}`;
}

function renderBoard(fen, lastUci, expectedUci) {
  const board = $("board");
  const placement = (fen || "8/8/8/8/8/8/8/8").split(" ")[0];
  const hl = new Set(), ex = new Set();
  if (lastUci && lastUci.length >= 4) { hl.add(lastUci.slice(0,2)); hl.add(lastUci.slice(2,4)); }
  if (expectedUci && expectedUci.length >= 4) { ex.add(expectedUci.slice(0,2)); ex.add(expectedUci.slice(2,4)); }
  let html = "";
  const rows = placement.split("/");
  for (let r = 0; r < 8; r++) {
    let file = 0;
    for (const ch of rows[r]) {
      if (/\d/.test(ch)) {
        for (let i = 0; i < +ch; i++) { html += sq(r, file, "", ""); file++; }
      } else {
        const side = ch === ch.toUpperCase() ? "w" : "b";
        html += sq(r, file, GLYPHS[ch.toLowerCase()] || "", side); file++;
      }
    }
  }
  board.innerHTML = html;
  function sq(r, f, piece, side) {
    const name = "abcdefgh"[f] + (8 - r);
    const shade = (r + f) % 2 ? "d" : "l";
    return `<div class="sq ${shade} ${side}${ex.has(name) ? " ex" : hl.has(name) ? " hl" : ""}">${piece}</div>`;
  }
}

function renderSpark(sensor) {
  const svg = $("spark");
  const W = svg.clientWidth || 600, H = 120, PAD = 4, LABEL_W = 34;
  svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
  const now = Date.now() / 1000;
  while (pressureBuf.length && pressureBuf[0].t < now - WINDOW_S) pressureBuf.shift();
  if (!pressureBuf.length) { svg.innerHTML = ""; return; }

  const on = +sensor.on_threshold || 0, off = +sensor.off_threshold || 0, base = +sensor.baseline || 0;
  const maxP = Math.max(100, on * 1.3, ...pressureBuf.map(s => s.p));
  const x = t => PAD + (W - PAD * 2 - LABEL_W) * (1 - (now - t) / WINDOW_S);
  const y = p => H - PAD - (H - PAD * 2) * (p / maxP);

  const line = (v, label, color, dash) => v > 0 ?
    `<line x1="${PAD}" x2="${W - PAD - LABEL_W}" y1="${y(v)}" y2="${y(v)}" stroke="${color}" stroke-width="1" ${dash ? 'stroke-dasharray="4 3"' : ""}/>
     <text x="${W - PAD - LABEL_W + 4}" y="${y(v) + 3}">${label}</text>` : "";

  const pts = pressureBuf.map(s => `${x(s.t).toFixed(1)},${y(s.p).toFixed(1)}`).join(" ");
  svg.innerHTML =
    line(on, "on", "var(--baseline)", true) +
    line(off, "off", "var(--baseline)", true) +
    line(base, "base", "var(--grid)", false) +
    `<polyline points="${pts}" fill="none" stroke="var(--blue)" stroke-width="2" stroke-linejoin="round"/>`;
}

function renderLog(entries) {
  const ul = $("log");
  ul.innerHTML = (entries || []).slice().reverse().map(e => {
    const ts = new Date(e.t * 1000).toLocaleTimeString([], {hour12: false});
    const kc = KIND_COLOR[e.kind] || "var(--muted)";
    const kl = KIND_LABEL[e.kind] || e.kind;
    return `<li><span class="t">${ts}</span><span class="k" style="--kc:${kc}">${kl}</span><span class="d">${e.detail}</span></li>`;
  }).join("");
}

function renderMoves(sans) {
  if (!sans || !sans.length) { $("moves").textContent = "—"; return; }
  let html = "";
  for (let i = 0; i < sans.length; i += 2) {
    html += `<b>${i / 2 + 1}.</b> ${sans[i]}${sans[i + 1] ? " " + sans[i + 1] : ""}&nbsp;&nbsp; `;
  }
  $("moves").innerHTML = html;
}

async function tick() {
  let s;
  try {
    s = await (await fetch("/state.json")).json();
  } catch {
    setChip("chip-robot", false, "dashboard unreachable");
    return;
  }
  setChip("chip-robot", s.connected, s.connected ? "robot connected" : "robot: " + (s.error || "down"));
  if (!s.connected) { $("hint").textContent = "waiting for robot…"; $("state").textContent = "—"; return; }

  const c = s.coach || {}, sen = s.sensor || {}, buz = s.buzzer || {};
  setChip("chip-session", !!c.session_running, c.session_running ? "session running" : "session stopped");
  setChip("chip-sensor", sen.connected === true, sen.connected === true ? "kGoal connected" : "kGoal down");
  setChip("chip-buzzer", buz.connected === true, buz.connected === true ? `Hush: ${buz.device || "ok"}` : "Hush down");

  $("state").textContent = c.state || "—";
  $("hint").textContent = c.hint || (c.error ? String(c.error) : "…");
  $("err").textContent = [sen.error, buz.error].filter(Boolean).join(" · ");

  practiceMode = !!c.practice_mode;
  const btn = $("btn-practice");
  btn.textContent = "practice: " + (practiceMode ? "on" : "off");
  btn.className = "ctl" + (practiceMode ? " on" : "");
  const expected = c.expected_move;
  $("expected").textContent = expected ? `opponent played ${expected.san} — squeeze it in` : "";
  const stats = c.stats || {};
  $("meta-stats").textContent = practiceMode ? `practice: ${stats.games || 0} games · ${stats.practice_fails || 0} fails` : "";

  const hist = c.move_history || [];
  renderBoard(c.fen, hist[hist.length - 1], expected && expected.uci);
  $("meta-color").textContent = "you: " + (c.user_color || "—");
  $("meta-turn").textContent = "turn: " + (c.turn || "—");
  $("meta-msg").textContent = "last input: " + ((c.last_message || []).join("-") || "—");
  renderMoves(c.move_history_san);
  renderLog(c.log);

  if (typeof sen.pressure === "number") {
    pressureBuf.push({t: Date.now() / 1000, p: sen.pressure});
    $("pressure").textContent = Math.round(sen.pressure);
    $("squeezing").className = "squeezing" + (sen.squeezing ? " on" : "");
    $("battery").textContent = sen.battery >= 0 ? `battery ${sen.battery}%` : "";
  }
  renderSpark(sen);
}

tick();
setInterval(tick, 400);
</script>
</body>
</html>
